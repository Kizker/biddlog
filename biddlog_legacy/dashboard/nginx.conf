server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: semua route diarahkan ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests ke collector container
    location /api/ {
        proxy_pass http://collector:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout lebih lama untuk scan yang bisa memakan waktu
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # Serve collector output files langsung (fallback jika API down)
    location /data/ {
        alias /app/collector/output/;
        autoindex off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Access-Control-Allow-Origin *;
    }

    # Cache aset statis (JS/CSS/gambar) selama 1 tahun
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Kompresi
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
